# ============================================================
# 🚀 Cloud-Native API - Full Observability Stack
# ============================================================
# Services:
#   - api:        FastAPI application (production image)
#   - prometheus: Metrics collection & alerting
#   - grafana:    Dashboards & visualization
#   - localstack: AWS cloud emulator (ECR, S3, etc.)
# ============================================================

services:
  # ---- Application ----
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloud-native-api
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - app-network
    restart: unless-stopped

  # ---- Prometheus (Metrics) ----
  prometheus:
    image: prom/prometheus:v3.4.1
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  # ---- Grafana (Dashboards) ----
  grafana:
    image: grafana/grafana:11.6.0
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/api-overview.json
    volumes:
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      - prometheus

  # ---- LocalStack (AWS Emulator) ----
  localstack:
    image: localstack/localstack:4.5
    container_name: localstack
    environment:
      - SERVICES=ecr,s3,ecs
      - DEBUG=0
      - DOCKER_HOST=unix:///var/run/docker.sock
    ports:
      - "4566:4566"      # LocalStack Gateway
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  localstack-data:
