# ============================================================
# Prometheus Configuration
# ============================================================
# Scrapes metrics from the FastAPI application at /metrics
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ---- Self-monitoring ----
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ---- FastAPI Application ----
  - job_name: "cloud-native-api"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "cloud-native-api"
          environment: "development"
